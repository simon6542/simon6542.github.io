<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SY Lab — 절세랩 · 마진랩</title>
<meta name="description" content="생활에 도움되는 계산기와 가이드를 만듭니다. 절세랩: 부동산 양도세 계산기, 마진랩: 아마존 셀러 마진 계산기.">
<style>
  :root { --ink:#111; --accent:#ff4d00; --mid:#757575; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR",sans-serif; color:var(--ink); display:flex; min-height:100vh; align-items:center; justify-content:center; padding:20px; }
  .box { max-width:560px; }
  h1 { font-size:clamp(32px,6vw,48px); font-weight:900; letter-spacing:-2px; line-height:1.15; }
  h1 span { color:var(--accent); }
  p { margin:16px 0 28px; color:var(--mid); font-size:16px; }
  a.card { display:block; border:2px solid var(--ink); padding:24px; text-decoration:none; color:var(--ink); transition:all .15s; }
  a.card:hover { background:var(--ink); color:#fff; }
  a.card .t { font-weight:900; font-size:20px; letter-spacing:-0.5px; }
  a.card .d { font-size:14px; color:var(--mid); margin-top:6px; }
  a.card:hover .d { color:rgba(255,255,255,.75); }
</style>
</head>
<body>
<div class="box">
  <h1>유용한 도구를<br><span>만듭니다</span></h1>
  <p>생활 속 복잡한 문제를 30초 만에 풀어주는 계산기와 가이드.</p>
  <a class="card" href="/jeolse-lab/">
    <div class="t">절세랩 →</div>
    <div class="d">부동산 양도세 계산기 & 절세 시나리오 진단 · 절세 가이드 10편</div>
  </a>
  <a class="card" style="margin-top:14px" href="/margin-lab/">
    <div class="t">마진랩 →</div>
    <div class="d">아마존 셀러 마진 계산기 & 손익분기 진단 · 마진 가이드 10편</div>
  </a>
</div>
</body>
</html>
